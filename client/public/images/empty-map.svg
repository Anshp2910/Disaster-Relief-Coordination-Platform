<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Map background -->
  <rect x="60" y="30" width="280" height="210" rx="12" fill="#F0F4FF" stroke="#000080" stroke-width="1.5" opacity="0.3"/>
  <!-- Map fold lines -->
  <line x1="160" y1="30" x2="160" y2="240" stroke="#000080" stroke-width="0.5" opacity="0.1"/>
  <line x1="240" y1="30" x2="240" y2="240" stroke="#000080" stroke-width="0.5" opacity="0.1"/>
  <line x1="60" y1="105" x2="340" y2="105" stroke="#000080" stroke-width="0.5" opacity="0.1"/>
  <line x1="60" y1="165" x2="340" y2="165" stroke="#000080" stroke-width="0.5" opacity="0.1"/>
  <!-- Map pin -->
  <g transform="translate(175, 80)">
    <path d="M25,0 C11.2,0 0,11.2 0,25 C0,43.75 25,60 25,60 C25,60 50,43.75 50,25 C50,11.2 38.8,0 25,0 Z" fill="#FF9933" opacity="0.7"/>
    <circle cx="25" cy="22" r="10" fill="white" opacity="0.8"/>
  </g>
  <!-- Question mark -->
  <text x="200" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#000080" opacity="0.2">?</text>
  <!-- Text -->
  <text x="200" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#000080" opacity="0.7">No Locations to Display</text>
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666666">Create relief requests to see them on the map.</text>
  <!-- Tricolor accent -->
  <rect x="160" y="297" width="30" height="3" rx="1.5" fill="#FF9933" opacity="0.6"/>
  <rect x="195" y="297" width="10" height="3" rx="1.5" fill="white" opacity="0.6"/>
  <rect x="210" y="297" width="30" height="3" rx="1.5" fill="#138808" opacity="0.6"/>
</svg>
