<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000080;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#000050;stop-opacity:0.98"/>
    </linearGradient>
    <linearGradient id="saffronWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9933"/>
      <stop offset="100%" style="stop-color:#FFB366"/>
    </linearGradient>
    <linearGradient id="greenWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#138808"/>
      <stop offset="100%" style="stop-color:#1AAF0A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <!-- Tricolor wave top -->
  <path d="M0,20 Q150,0 300,20 T600,20 T900,20 T1200,20 L1200,0 L0,0 Z" fill="url(#saffronWave)" opacity="0.9"/>
  <!-- Tricolor wave bottom -->
  <path d="M0,280 Q150,300 300,280 T600,280 T900,280 T1200,280 L1200,300 L0,300 Z" fill="url(#greenWave)" opacity="0.9"/>
  <!-- White middle stripe -->
  <rect x="0" y="140" width="1200" height="20" fill="white" opacity="0.15"/>
  <!-- Ashoka Chakra watermark -->
  <circle cx="1050" cy="150" r="100" fill="none" stroke="white" stroke-width="2" opacity="0.1"/>
  <circle cx="1050" cy="150" r="20" fill="white" opacity="0.1"/>
  <g stroke="white" stroke-width="1" opacity="0.08">
    <line x1="1050" y1="50" x2="1050" y2="80" transform="rotate(0 1050 150)"/>
    <line x1="1050" y1="50" x2="1050" y2="80" transform="rotate(15 1050 150)"/>
    <line x1="1050" y1="50" x2="1050" y2="80" transform="rotate(30 1050 150)"/>
    <line x1="1050" y1="50" x2="1050" y2="80" transform="rotate(45 1050 150)"/>
    <line x1="1050" y1="50" x2="1050" y2="80" transform="rotate(60 1050 150)"/>
    <line x1="1050" y1="50" x2="1050" y2="80" transform="rotate(75 1050 150)"/>
    <line x1="1050" y1="50" x2="1050" y2="80" transform="rotate(90 1050 150)"/>
    <line x1="1050" y1="50" x2="1050" y2="80" transform="rotate(105 1050 150)"/>
    <line x1="1050" y1="50" x2="1050" y2="80" transform="rotate(120 1050 150)"/>
    <line x1="1050" y1="50" x2="1050" y2="80" transform="rotate(135 1050 150)"/>
    <line x1="1050" y1="50" x2="1050" y2="80" transform="rotate(150 1050 150)"/>
    <line x1="1050" y1="50" x2="1050" y2="80" transform="rotate(165 1050 150)"/>
  </g>
  <!-- Globe outline -->
  <circle cx="150" cy="150" r="80" fill="none" stroke="white" stroke-width="1.5" opacity="0.15"/>
  <ellipse cx="150" cy="150" rx="40" ry="80" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
  <line x1="70" y1="150" x2="230" y2="150" stroke="white" stroke-width="1" opacity="0.1"/>
  <line x1="150" y1="70" x2="150" y2="230" stroke="white" stroke-width="1" opacity="0.1"/>
  <!-- Text content -->
  <text x="600" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="white" opacity="0.95">Disaster Relief Coordination Platform</text>
  <text x="600" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="white" opacity="0.7">Connecting those in need with those who can help</text>
  <text x="600" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FF9933" opacity="0.8">Government of India Initiative</text>
  <!-- Helper icons -->
  <g transform="translate(380, 210)" opacity="0.3">
    <circle cx="15" cy="10" r="8" fill="white"/>
    <path d="M5,30 Q15,18 25,30" fill="white"/>
  </g>
  <g transform="translate(530, 210)" opacity="0.3">
    <circle cx="15" cy="10" r="8" fill="white"/>
    <path d="M5,30 Q15,18 25,30" fill="white"/>
  </g>
  <g transform="translate(680, 210)" opacity="0.3">
    <circle cx="15" cy="10" r="8" fill="white"/>
    <path d="M5,30 Q15,18 25,30" fill="white"/>
  </g>
</svg>
