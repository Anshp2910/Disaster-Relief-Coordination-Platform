<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="description" content="Disaster Relief Coordination Platform - Coordinating disaster relief efforts across India" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DisasterRelief" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="icon"  type="image/svg+xml" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://*.tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://disaster-relief-coordination-platform-l6mk.onrender.com" />
    <title>Disaster Relief Coordination Platform | Government of India Initiative</title>
    <style>
      body { margin: 0; background: #0a0e1a; }
      #root { min-height: 100vh; }
      .initial-loader { display: flex; align-items: center; justify-content: center; min-height: 100vh; gap: 12px; font-family: system-ui, sans-serif; color: #8e8e93; }
      .initial-spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.08); border-top-color: #00d4ff; border-radius: 50%; animation: spin 0.7s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="initial-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {})
        })
      }
    </script>
  </body>
</html>
